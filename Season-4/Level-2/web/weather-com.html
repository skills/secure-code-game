<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather.com - Weather Forecasts</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1b2838; color: white; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; }
  .header { background: #367cff; padding: 14px 20px; border-radius: 8px 8px 0 0; font-size: 20px; font-weight: bold; }
  .current { background: #243447; padding: 20px; border-radius: 8px; margin-bottom: 12px; text-align: center; }
  .temp { font-size: 64px; font-weight: 300; }
  .condition { font-size: 18px; color: #a0c4ff; margin-top: 4px; }
  .city { font-size: 14px; color: #8899aa; margin-top: 8px; }
  .forecast { display: flex; gap: 8px; flex-wrap: wrap; }
  .day { background: #243447; padding: 14px; border-radius: 8px; flex: 1; min-width: 120px; text-align: center; }
  .day-name { font-size: 13px; color: #8899aa; margin-bottom: 6px; }
  .day-icon { font-size: 28px; margin: 6px 0; }
  .day-temp { font-size: 16px; font-weight: 600; }
  .day-low { font-size: 12px; color: #8899aa; }
  .section-title { font-size: 16px; font-weight: 600; margin: 16px 0 10px; color: #a0c4ff; }
</style>
</head>
<body>
<div class="container">
  <div class="header">Weather.com</div>

  <div class="current">
    <div class="temp">24°C</div>
    <div class="condition">Mostly Sunny</div>
    <div class="city">New York, United States · Updated 2:30 PM</div>
  </div>

  <div class="section-title">5-Day Forecast</div>
  <div class="forecast">
    <div class="day">
      <div class="day-name">Mon</div>
      <div class="day-icon">⛅</div>
      <div class="day-temp">19°C</div>
      <div class="day-low">Low: 11°C</div>
    </div>
    <div class="day">
      <div class="day-name">Tue</div>
      <div class="day-icon">🌧️</div>
      <div class="day-temp">15°C</div>
      <div class="day-low">Low: 9°C</div>
    </div>
    <div class="day">
      <div class="day-name">Wed</div>
      <div class="day-icon">☀️</div>
      <div class="day-temp">21°C</div>
      <div class="day-low">Low: 12°C</div>
    </div>
    <div class="day">
      <div class="day-name">Thu</div>
      <div class="day-icon">⛅</div>
      <div class="day-temp">17°C</div>
      <div class="day-low">Low: 10°C</div>
    </div>
    <div class="day">
      <div class="day-name">Fri</div>
      <div class="day-icon">🌤️</div>
      <div class="day-temp">20°C</div>
      <div class="day-low">Low: 13°C</div>
    </div>
  </div>

  <div class="section-title">Other Cities</div>
  <div class="forecast">
    <div class="day">
      <div class="day-name">London</div>
      <div class="day-icon">⛅</div>
      <div class="day-temp">18°C</div>
      <div class="day-low">Cloudy</div>
    </div>
    <div class="day">
      <div class="day-name">Tokyo</div>
      <div class="day-icon">🌧️</div>
      <div class="day-temp">22°C</div>
      <div class="day-low">Rainy</div>
    </div>
    <div class="day">
      <div class="day-name">Sydney</div>
      <div class="day-icon">⛅</div>
      <div class="day-temp">16°C</div>
      <div class="day-low">Cloudy</div>
    </div>
    <div class="day">
      <div class="day-name">Dubai</div>
      <div class="day-icon">☀️</div>
      <div class="day-temp">38°C</div>
      <div class="day-low">Clear</div>
    </div>
  </div>

</div>
</body>
</html>
